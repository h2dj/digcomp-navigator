<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 327" role="img" aria-labelledby="title desc">
  <title id="title">IT logo</title>
  <desc id="desc">Colorful loop-shaped mark with blue IT letters.</desc>
  <defs>
    <linearGradient id="blueLoop" x1="37" x2="214" y1="276" y2="61" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00A8E8"/>
      <stop offset=".56" stop-color="#2EB2EA"/>
      <stop offset="1" stop-color="#1F77B4"/>
    </linearGradient>
    <linearGradient id="navyLoop" x1="103" x2="306" y1="218" y2="287" gradientUnits="userSpaceOnUse">
